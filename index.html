<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Piket 5S - SMKN 10 Semarang</title>

<style>
html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#f4f6f9;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}

/* Iframe mengikuti wrapper yang sudah terbukti */
iframe{
    display:block;
    width:100%;
    height:100vh;
    height:100dvh;
    border:none;
    opacity:0;
    transition:opacity .25s ease;
}

/* Splash Screen */
#loader{
    position:fixed;
    inset:0;
    background:#f4f6f9;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
    transition:opacity .25s ease;
}

.spinner{
    width:48px;
    height:48px;
    border:4px solid #d9d9d9;
    border-top-color:#0d6efd;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

.text{
    margin-top:18px;
    color:#555;
    font-size:15px;
    font-weight:600;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}
</style>

</head>

<body>

<div id="loader">
    <div class="spinner"></div>
    <div class="text">
        Memuat Sistem Piket 5S...
    </div>
</div>

<iframe
    id="app"
    src="https://script.google.com/macros/s/AKfycbwWYTMHxbY9MUR0YL0oMlcItUB_0e9dIGDFV1L-jTLJLHYuyjnlyV169Eo5b5nx7LS4/exec"
    title="Piket 5S SMKN 10 Semarang"
    allow="camera; microphone; geolocation"
    loading="eager">
</iframe>

<script>

const iframe=document.getElementById("app");
const loader=document.getElementById("loader");

iframe.onload=function(){

    iframe.style.opacity="1";

    loader.style.opacity="0";

    loader.addEventListener("transitionend",()=>{
        loader.remove();
    },{once:true});

};

// Timeout jika gagal memuat
setTimeout(function(){

    if(loader){

        loader.innerHTML=`
            <div style="text-align:center;padding:30px">
                <h3>Koneksi lambat...</h3>
                <p>Silakan tunggu beberapa saat atau muat ulang halaman.</p>
            </div>
        `;

    }

},15000);

</script>

</body>
</html>
