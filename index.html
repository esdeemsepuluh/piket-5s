<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Piket 5S - SMKN 10 Semarang</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
        }
        /* Loader sebelum aplikasi Google termuat sempurna */
        .loader-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 999;
            background-color: #f8f9fa;
            transition: opacity 0.5s ease;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.05);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border-left-color: #0d6efd;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            margin-top: 20px;
            color: #495057;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        /* Iframe pembungkus aplikasi web */
        iframe {
            border: none;
            width: 100%;
            height: 100%;
            display: block;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

    <div class="loader-container" id="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">Menghubungkan ke Sistem Piket SMKN 10...</div>
    </div>
    
    <iframe 
        id="app-frame" 
        src="https://script.google.com/macros/s/AKfycbwWYTMHxbY9MUR0YL0oMlcItUB_0e9dIGDFV1L-jTLJLHYuyjnlyV169Eo5b5nx7LS4/exec" 
        allow="camera; microphone; geolocation"
        onload="aplikasiSiap()">
    </iframe>

    <script>
        function aplikasiSiap() {
            // Sembunyikan layar loading dengan efek transisi halus
            const loader = document.getElementById('loading-screen');
            const iframe = document.getElementById('app-frame');
            
            loader.style.opacity = '0';
            iframe.style.opacity = '1';
            
            setTimeout(() => {
                loader.style.display = 'none';
            }, 500);
        }
    </script>
</body>
</html>
